<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Tibia Quest Suggest...er</title>
  <link rel="stylesheet" href="styles.css?v=20260708-24">
</head>
<body>
  <main class="shell quest-shell">
    <nav class="site-nav" aria-label="Tools">
      <a class="site-nav-link" href="index.html">Equipment Finder</a>
      <a class="site-nav-link" href="speed-breakpoint.html">Speed Breakpoint Calculator</a>
      <a class="site-nav-link active" href="quest-suggester.html">Quest Suggest...er <span class="beta-tag">Beta</span></a>
      <a class="site-nav-link" href="achievement-tracker.html">Achievement Tracker <span class="beta-tag">Beta</span></a>
    </nav>

    <header class="hero quest-hero">
      <p class="eyebrow">Tibia mainland planning</p>
      <h1>Quest Suggest...er</h1>
      <p class="intro">Choose your level, area and reward goal. Done quests stay hidden, and later quests wait at the end.</p>
    </header>

    <section id="questControls" class="panel quest-controls" aria-label="Quest filters">
      <label>
        Level
        <input id="questLevel" type="number" min="1" value="100">
      </label>

      <label>
        Area
        <select id="questArea"></select>
      </label>

      <label>
        Reward
        <select id="questReward"></select>
      </label>

      <label>
        Search
        <input id="questSearch" type="search" placeholder="Quest, reward, city">
      </label>

      <label class="checkbox-label quest-hide-done">
        Visibility
        <span class="toggle-row">
          <input id="questHideDone" type="checkbox" checked>
          <span>Hide done</span>
        </span>
      </label>

      <label class="checkbox-label quest-hide-unavailable">
        Availability
        <span class="toggle-row">
          <input id="questHideUnavailable" type="checkbox" checked>
          <span>Hide unavailable</span>
        </span>
      </label>
    </section>

    <section class="quest-summary-grid" aria-live="polite">
      <button class="quest-stat" type="button" data-quest-view="suggested">
        <span>Suggested</span>
        <strong id="questSuggestedCount">0</strong>
      </button>
      <button class="quest-stat" type="button" data-quest-view="review">
        <span>Worth checking</span>
        <strong id="questReviewCount">0</strong>
      </button>
      <button class="quest-stat" type="button" data-quest-view="done">
        <span>Done</span>
        <strong id="questDoneCount">0</strong>
      </button>
      <button class="quest-stat" type="button" data-quest-view="later">
        <span>Later</span>
        <strong id="questLaterCount">0</strong>
      </button>
      <button class="quest-stat" type="button" data-quest-view="unavailable">
        <span>Unavailable</span>
        <strong id="questUnavailableCount">0</strong>
      </button>
    </section>

    <section class="results-head quest-results-head">
      <div>
        <div class="results-title-row">
          <h2 id="questResultsTitle">Suggested quests</h2>
        </div>
        <p id="questSummary"></p>
      </div>
      <button id="questResetButton" class="secondary-button" type="button">Clear saved quest states</button>
    </section>

    <section id="questResults" class="quest-results" aria-live="polite"></section>
  </main>

  <script src="data/quests.js?v=20260708-24"></script>
  <script src="data/achievements.js?v=20260708-24"></script>
  <script src="quest-suggester.js?v=20260708-24"></script>
</body>
</html>
